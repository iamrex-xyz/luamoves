# Static SPA server. Client-side routes (e.g. /tasklist) must fall back to
# index.html so React Router can handle them.
server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Long-cache the content-hashed build assets.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # SPA fallback for everything else.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
